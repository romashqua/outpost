{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "outpost.fullname" . }}-proxy
  labels:
    {{- include "outpost.labels" . | nindent 4 }}
    {{- include "outpost.selectorLabels" (dict "root" . "component" "proxy") | nindent 4 }}
spec:
  type: {{ .Values.proxy.service.type }}
  ports:
    - name: http
      port: {{ .Values.proxy.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "outpost.selectorLabels" (dict "root" . "component" "proxy") | nindent 4 }}
{{- end }}
