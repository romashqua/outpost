name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Vet
        run: go vet ./...

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build core image
        run: docker build -f deploy/docker/Dockerfile.core -t outpost-core:ci .

      - name: Build gateway image
        run: docker build -f deploy/docker/Dockerfile.gateway -t outpost-gateway:ci .

      - name: Build proxy image
        run: docker build -f deploy/docker/Dockerfile.proxy -t outpost-proxy:ci .
