          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZTNAPolicy"
        "400":
          description: Invalid policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteZTNAPolicy
      summary: Delete a ZTNA policy
      tags: [ZTNA]
      responses:
        "204":
          description: Policy deleted
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

