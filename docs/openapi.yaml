      operationId: createDNSRule
      summary: Create a split DNS rule
      tags: [ZTNA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DNSRuleRequest"
      responses:
        "201":
          description: DNS rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DNSRule"
        "400":
          description: Invalid rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/ztna/dns-rules/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: deleteDNSRule
      summary: Delete a split DNS rule
      tags: [ZTNA]
      responses:
        "204":
          description: DNS rule deleted
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

# ══════════════════════════════════════════════════════════════════════
# Components
# ══════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained via POST /api/v1/auth/login

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        default: 1
        minimum: 1

    PerPage:
      name: per_page
      in: query
      description: Items per page
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100

    From:
      name: from
      in: query
      description: "Start of time range (RFC 3339). Defaults to 24h ago."
      schema:
        type: string
        format: date-time
        example: "2026-03-12T00:00:00Z"

    To:
      name: to
      in: query
      description: "End of time range (RFC 3339). Defaults to now."
      schema:
        type: string
        format: date-time
        example: "2026-03-13T00:00:00Z"

  schemas:
    # ── Common ──────────────────────────────────────────────────────
    StatusOK:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: something went wrong

    # ── Auth ────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          example: admin
        password:
          type: string
          format: password
          minLength: 1
          example: secret123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT bearer token (empty when mfa_required is true)
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp when the token expires
        mfa_required:
          type: boolean
          description: Whether MFA verification is needed
        mfa_token:
          type: string
          description: Short-lived token for MFA verification step

    MFAVerifyRequest:
      type: object
      required: [mfa_token, code]
      properties:
        mfa_token:
          type: string
          description: MFA token received from login
        code:
          type: string
          description: TOTP code or backup code
          example: "123456"
        method:
          type: string
          enum: [totp, email, backup]
          description: MFA method (defaults to totp)

    # ── Users ───────────────────────────────────────────────────────
    User:
      type: object
      required: [id, username, email, is_active, is_admin, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
          nullable: true
        is_active:
          type: boolean
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserListResponse:
      type: object
      required: [data, page, per_page]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        page:
          type: integer
        per_page:
          type: integer

    CreateUserRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        is_admin:
          type: boolean
          default: false

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        is_active:
          type: boolean
        is_admin:
          type: boolean

    # ── Networks ────────────────────────────────────────────────────
    Network:
      type: object
      required: [id, name, address, port, keepalive, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
          description: CIDR notation
          example: 10.10.0.0/24
        dns:
          type: array
          items:
            type: string
          example: ["1.1.1.1", "8.8.8.8"]
        port:
          type: integer
          example: 51820
        keepalive:
          type: integer
          description: PersistentKeepalive interval in seconds
          example: 25
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateNetworkRequest:
      type: object
      required: [name, address]
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
          description: CIDR notation
          example: 10.10.0.0/24
        dns:
          type: array
          items:
            type: string
        port:
          type: integer
          default: 51820
        keepalive:
          type: integer
          default: 25

    UpdateNetworkRequest:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        dns:
          type: array
          items:
            type: string
        port:
          type: integer
        keepalive:
          type: integer
        is_active:
          type: boolean

    # ── Devices ─────────────────────────────────────────────────────
    Device:
      type: object
      required: [id, user_id, name, wireguard_pubkey, is_approved, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        wireguard_pubkey:
          type: string
          description: WireGuard public key (base64)
        assigned_ip:
          type: string
          description: Auto-assigned VPN IP address
          example: 10.10.0.2
        is_approved:
          type: boolean
        last_handshake:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDeviceRequest:
      type: object
      required: [name, wireguard_pubkey]
      properties:
        name:
          type: string
          minLength: 1
          example: MacBook Pro
        wireguard_pubkey:
          type: string
          description: WireGuard public key (base64)

    # ── Gateways ────────────────────────────────────────────────────
    Gateway:
      type: object
      required: [id, network_id, name, wireguard_pubkey, endpoint, is_active, priority, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        network_id:
          type: string
          format: uuid
        name:
          type: string
        wireguard_pubkey:
          type: string
          description: WireGuard public key (base64)
        endpoint:
          type: string
          description: "host:port for WireGuard"
          example: vpn.example.com:51820
        is_active:
          type: boolean
        priority:
          type: integer
          description: Failover priority (lower = preferred)
        last_seen:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GatewayWithCredentials:
      description: Returned only on gateway creation — credentials are never retrievable again
      allOf:
        - $ref: "#/components/schemas/Gateway"
        - type: object
          required: [token, private_key]
          properties:
            token:
              type: string
              description: Authentication token for the gateway agent
            private_key:
              type: string
              description: WireGuard private key (base64) — store securely

    CreateGatewayRequest:
      type: object
      required: [name, network_id, endpoint]
      properties:
        name:
          type: string
          minLength: 1
        network_id:
          type: string
          format: uuid
        endpoint:
          type: string
          description: "host:port for WireGuard"
          example: gw1.example.com:51820

    # ── Analytics ───────────────────────────────────────────────────
    BandwidthBucket:
      type: object
      required: [timestamp, bytes_sent, bytes_recv]
      properties:
        timestamp:
          type: string
          format: date-time
        bytes_sent:
          type: integer
          format: int64
        bytes_recv:
          type: integer
          format: int64

    UserBandwidth:
      type: object
      required: [user_id, bytes_sent, bytes_recv, total]
      properties:
        user_id:
          type: string
          format: uuid
        bytes_sent:
          type: integer
          format: int64
        bytes_recv:
          type: integer
          format: int64
        total:
          type: integer
          format: int64

    HourlyConnections:
      type: object
      required: [hour, count]
      properties:
        hour:
          type: integer
          description: Hour of day (0-23)
          minimum: 0
          maximum: 23
        count:
          type: integer

    AnalyticsSummary:
      type: object
      required: [total_bytes_sent, total_bytes_recv, total_flows, unique_users, unique_devices]
      properties:
        total_bytes_sent:
          type: integer
          format: int64
        total_bytes_recv:
          type: integer
          format: int64
        total_flows:
          type: integer
        unique_users:
          type: integer
        unique_devices:
          type: integer

    # ── Compliance ──────────────────────────────────────────────────
    ComplianceReport:
      type: object
      required:
        - overall_score
        - mfa_adoption
        - encryption_rate
        - posture_rate
        - audit_log_enabled
        - password_policy
        - session_timeout
        - checks
      properties:
        overall_score:
          type: integer
          description: Weighted compliance score (0-100)
          minimum: 0
          maximum: 100
        mfa_adoption:
          type: number
          format: double
          description: Percentage of users with MFA enabled
        encryption_rate:
          type: number
          format: double
          description: Percentage of devices with disk encryption
        posture_rate:
          type: number
          format: double
          description: Percentage of devices passing posture checks
        audit_log_enabled:
          type: boolean
        password_policy:
          type: boolean
        session_timeout:
          type: boolean
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ComplianceCheck"

    ComplianceCheck:
      type: object
      required: [id, category, name, description, status, details]
      properties:
        id:
          type: string
          example: soc2-mfa
        category:
          type: string
          enum: [SOC2, ISO27001, GDPR]
        name:
          type: string
          example: Multi-Factor Authentication
        description:
          type: string
        status:
          type: string
          enum: [pass, fail, warning]
        details:
          type: string

    # ── OIDC ────────────────────────────────────────────────────────
    OIDCDiscovery:
      type: object
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        userinfo_endpoint:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri
        scopes_supported:
          type: array
          items:
            type: string
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
        subject_types_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string

    OIDCTokenResponse:
      type: object
      required: [access_token, token_type, expires_in, id_token]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600
        id_token:
          type: string
          description: RS256-signed JWT with user claims

    OIDCError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          enum: [invalid_request, invalid_client, invalid_grant, unauthorized_client, unsupported_grant_type]
        error_description:
          type: string

    OIDCUserInfo:
      type: object
      properties:
        sub:
          type: string
          format: uuid
        name:
          type: string
        preferred_username:
          type: string
        email:
          type: string
          format: email
        email_verified:
          type: boolean
        groups:
          type: array
          items:
            type: string

    JWKS:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            properties:
              kty:
                type: string
                example: RSA
              kid:
                type: string
              alg:
                type: string
                example: RS256
              use:
                type: string
                example: sig
              n:
                type: string
                description: RSA modulus (base64url)
              e:
                type: string
                description: RSA exponent (base64url)

    # ── MFA ─────────────────────────────────────────────────────────
    MFAStatus:
      type: object
      required: [totp_enabled, webauthn_enabled, backup_codes_remaining, mfa_enabled]
      properties:
        totp_enabled:
          type: boolean
        totp_verified:
          type: boolean
        webauthn_enabled:
          type: boolean
        webauthn_credentials:
          type: integer
          description: Number of registered WebAuthn credentials
        backup_codes_remaining:
          type: integer
        mfa_enabled:
          type: boolean
          description: Whether MFA is globally enabled for this user

    WebAuthnCredential:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: YubiKey 5
        sign_count:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    # ── SCIM ────────────────────────────────────────────────────────
    SCIMListResponse:
      type: object
      required: [schemas, totalResults, Resources]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:ListResponse"]
        totalResults:
          type: integer
        startIndex:
          type: integer
        itemsPerPage:
          type: integer
        Resources:
          type: array
          items:
            type: object

    SCIMUser:
      type: object
      required: [schemas, userName]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:User"]
        id:
          type: string
          format: uuid
        externalId:
          type: string
        userName:
          type: string
        name:
          type: object
          properties:
            givenName:
              type: string
            familyName:
              type: string
        emails:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                format: email
              primary:
                type: boolean
        active:
          type: boolean
        meta:
          type: object
          properties:
            resourceType:
              type: string
              example: User
            created:
              type: string
              format: date-time
            lastModified:
              type: string
              format: date-time

    SCIMGroup:
      type: object
      required: [schemas, displayName]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:schemas:core:2.0:Group"]
        id:
          type: string
          format: uuid
        displayName:
          type: string
        members:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                format: uuid
              display:
                type: string
        meta:
          type: object
          properties:
            resourceType:
              type: string
              example: Group
            created:
              type: string
              format: date-time

    SCIMError:
      type: object
      required: [schemas, status, detail]
      properties:
        schemas:
          type: array
          items:
            type: string
          example: ["urn:ietf:params:scim:api:messages:2.0:Error"]
        status:
          type: string
          example: "409"
        detail:
          type: string

    # ── Dashboard ────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required:
        - active_users
        - total_users
        - active_devices
        - total_devices
        - active_gateways
        - total_gateways
        - active_networks
        - s2s_tunnels
      properties:
        active_users:
          type: integer
        total_users:
          type: integer
        active_devices:
          type: integer
        total_devices:
          type: integer
        active_gateways:
          type: integer
        total_gateways:
          type: integer
        active_networks:
          type: integer
        s2s_tunnels:
          type: integer

    # ── Device Enrollment / Config ───────────────────────────────────
    EnrollDeviceRequest:
      type: object
      required: [name, wireguard_pubkey]
      properties:
        name:
          type: string
          minLength: 1
          example: iPhone 15
        wireguard_pubkey:
          type: string
          description: WireGuard public key (base64)

    EnrollDeviceResponse:
      type: object
      required: [device_id, address, dns, endpoint, server_public_key, allowed_ips, persistent_keepalive]
      properties:
        device_id:
          type: string
          format: uuid
        address:
          type: string
          description: Assigned VPN address with mask
          example: 10.10.0.3/24
        dns:
          type: array
          items:
            type: string
          example: ["1.1.1.1"]
        endpoint:
          type: string
          example: vpn.example.com:51820
        server_public_key:
          type: string
        allowed_ips:
          type: array
          items:
            type: string
          example: ["0.0.0.0/0"]
        persistent_keepalive:
          type: integer
          example: 25

    DeviceConfigResponse:
      type: object
      required: [config, private_key, public_key]
      properties:
        config:
          type: string
          description: WireGuard INI-format configuration
        private_key:
          type: string
          description: WireGuard private key (base64)
        public_key:
          type: string
          description: WireGuard public key (base64)

    # ── S2S Tunnels ──────────────────────────────────────────────────
    S2STunnel:
      type: object
      required: [id, name, topology, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        topology:
          type: string
          enum: [mesh, hub_spoke]
        hub_gateway_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateS2STunnelRequest:
      type: object
      required: [name, topology]
      properties:
        name:
          type: string
          minLength: 1
        topology:
          type: string
          enum: [mesh, hub_spoke]
        hub_gateway_id:
          type: string
          format: uuid
          description: Required for hub_spoke topology

    # ── Settings ─────────────────────────────────────────────────────
    SettingEntry:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value: {}

    TestEmailRequest:
      type: object
      required: [to]
      properties:
        to:
          type: string
          format: email
          description: Recipient email address

    # ── Smart Routes ─────────────────────────────────────────────────
    SmartRoute:
      type: object
      required: [id, name, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        entries:
          type: array
          items:
            $ref: "#/components/schemas/SmartRouteEntry"

    SmartRouteEntry:
      type: object
      required: [id, smart_route_id, entry_type, value, action, priority, created_at]
      properties:
        id:
          type: string
          format: uuid
        smart_route_id:
          type: string
          format: uuid
        entry_type:
          type: string
          enum: [domain, cidr, domain_suffix]
        value:
          type: string
          example: "*.google.com"
        action:
          type: string
          enum: [proxy, direct, block]
        proxy_id:
          type: string
          format: uuid
          nullable: true
        proxy_name:
          type: string
          nullable: true
        priority:
          type: integer
          example: 100
        created_at:
          type: string
          format: date-time

    CreateSmartRouteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    UpdateSmartRouteRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean

    CreateSmartRouteEntryRequest:
      type: object
      required: [entry_type, value, action]
      properties:
        entry_type:
          type: string
          enum: [domain, cidr, domain_suffix]
        value:
          type: string
        action:
          type: string
          enum: [proxy, direct, block]
        proxy_id:
          type: string
          format: uuid
          description: Required when action is 'proxy'
        priority:
          type: integer
          default: 100

    ProxyServer:
      type: object
      required: [id, name, type, address, port, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [socks5, http, shadowsocks, vless]
        address:
          type: string
        port:
          type: integer
        username:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
        extra_config:
          type: string
          nullable: true
          description: JSON-encoded extra configuration
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProxyServerRequest:
      type: object
      required: [name, type, address, port]
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [socks5, http, shadowsocks, vless]
        address:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        username:
          type: string
        password:
          type: string
        extra_config:
          type: string
          description: JSON string

    # ── Webhook ───────────────────────────────────────────────────────
    WebhookSubscription:
      type: object
      required: [id, url, events, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        secret:
          type: string
        events:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Audit ────────────────────────────────────────────────────────
    AuditEntry:
      type: object
      required: [id, timestamp, action, resource, ip_address, user_agent]
      properties:
        id:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        user_id:
          type: string
          nullable: true
        action:
          type: string
        resource:
          type: string
        details:
          description: Arbitrary JSON details
        ip_address:
          type: string
        user_agent:
          type: string

    AuditListResponse:
      type: object
      required: [data, total, page, per_page, total_pages]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        total:
          type: integer
          format: int64
        page:
          type: integer
        per_page:
          type: integer
        total_pages:
          type: integer

    AuditStat:
      type: object
      required: [action, bucket, count]
      properties:
        action:
          type: string
        bucket:
          type: string
          format: date-time
        count:
          type: integer
          format: int64

    # ── ZTNA ──
    TrustScore:
      type: object
      required: [device_id, score, level, evaluated_at]
      properties:
        device_id:
          type: string
          format: uuid
        score:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [high, medium, low, critical]
        violations:
          type: array
          items:
            type: string
        evaluated_at:
          type: string
          format: date-time

    TrustScoreSummary:
      type: object
      required: [device_id, device_name, score, level, evaluated_at]
      properties:
        device_id:
          type: string
          format: uuid
        device_name:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [high, medium, low, critical]
        evaluated_at:
          type: string
          format: date-time

    TrustScoreConfig:
      type: object
      required: [weight_disk_encryption, weight_screen_lock, weight_antivirus, weight_firewall, weight_os_version, weight_mfa, threshold_high, threshold_medium, threshold_low]
      properties:
        weight_disk_encryption:
          type: integer
          description: Weight for disk encryption (all weights must sum to 100)
        weight_screen_lock:
          type: integer
        weight_antivirus:
          type: integer
        weight_firewall:
          type: integer
        weight_os_version:
          type: integer
        weight_mfa:
          type: integer
        threshold_high:
          type: integer
          description: Score >= this is "high" trust
        threshold_medium:
          type: integer
          description: Score >= this is "medium" trust
        threshold_low:
          type: integer
          description: Score >= this is "low" trust (below = "critical")
        auto_restrict_below:
          type: integer
          description: Auto-restrict access for devices scoring below this
        auto_block_below:
          type: integer
          description: Auto-block access for devices scoring below this

    ZTNAPolicy:
      type: object
      required: [id, name, action, priority, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        conditions:
          type: object
          description: JSON conditions (e.g. trust_level, user_group, network)
        action:
          type: string
          enum: [allow, restrict, deny]
        network_ids:
          type: array
          items:
            type: string
            format: uuid
        priority:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ZTNAPolicyRequest:
      type: object
      required: [name, action, priority]
      properties:
        name:
          type: string
        description:
          type: string
        conditions:
          type: object
        action:
          type: string
          enum: [allow, restrict, deny]
        network_ids:
          type: array
          items:
            type: string
            format: uuid
        priority:
          type: integer
        is_active:
          type: boolean
          default: true

    DNSRule:
      type: object
      required: [id, network_id, domain, dns_server, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        network_id:
          type: string
          format: uuid
        domain:
          type: string
          description: Domain pattern (e.g. "*.corp.example.com")
        dns_server:
          type: string
          description: DNS server address (e.g. "10.0.0.53:53")
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    DNSRuleRequest:
      type: object
      required: [network_id, domain, dns_server]
      properties:
        network_id:
          type: string
          format: uuid
        domain:
          type: string
        dns_server:
          type: string
        is_active:
          type: boolean
          default: true

security:
  - BearerAuth: []
