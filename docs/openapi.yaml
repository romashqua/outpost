          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProxyServer"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createProxyServer
      summary: Create a proxy server
      tags: [SmartRoutes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProxyServerRequest"
      responses:
        "201":
          description: Proxy server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyServer"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate proxy server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/smart-routes/proxy-servers/{id}:
    delete:
      operationId: deleteProxyServer
      summary: Delete a proxy server
      tags: [SmartRoutes]
      parameters:
        - $ref: "#/components/parameters/ResourceID"
