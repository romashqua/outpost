          description: List of device trust scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrustScoreSummary"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/ztna/trust-config:
    get:
      operationId: getTrustConfig
      summary: Get trust score configuration (weights, thresholds)
      tags: [ZTNA]
      responses:
        "200":
          description: Trust score configuration
          content:
            application/json:
              schema:
