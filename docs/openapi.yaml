openapi: 3.1.0
info:
  title: Outpost VPN API
  description: |
    Open-source WireGuard VPN & Zero-Trust Network Access platform.
    All features available under Apache 2.0 — no enterprise paywalls.
  version: 1.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Romashqua Labs
    url: https://github.com/romashqua/outpost

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://vpn.example.com
    description: Production

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Auth
    description: Authentication and session management
  - name: OIDC
    description: Built-in OpenID Connect provider
  - name: MFA
    description: Multi-factor authentication management
  - name: SAML
    description: SAML 2.0 Service Provider
  - name: SCIM
    description: SCIM 2.0 user/group provisioning (RFC 7643/7644)
  - name: Users
    description: User management (CRUD)
  - name: Networks
    description: WireGuard network management
  - name: Devices
    description: Device (WireGuard peer) management
  - name: Gateways
    description: WireGuard gateway management
  - name: Analytics
    description: Traffic analytics and bandwidth monitoring
  - name: Compliance
    description: Automated compliance checks (SOC2, ISO27001, GDPR)
  - name: Dashboard
    description: Dashboard summary statistics
  - name: S2STunnels
    description: Site-to-site VPN tunnel management
  - name: Settings
    description: Application settings management
  - name: Mail
    description: Email operations
  - name: SmartRoutes
    description: Smart routing (selective proxy bypass)
  - name: Webhooks
    description: Outbound webhook subscription management
  - name: Audit
    description: Audit log viewer and export
  - name: ZTNA
    description: Zero-Trust Network Access (device trust scores, access policies, split DNS)

paths:
  # ── Health ──────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthz
      summary: Liveness probe
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"

  /readyz:
    get:
      operationId: readyz
      summary: Readiness probe (checks DB connectivity)
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "503":
          description: Database unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /metrics:
    get:
      operationId: metrics
      summary: Prometheus metrics
      tags: [Health]
      security: []
      responses:
        "200":
          description: Prometheus text exposition format

  # ── Auth ────────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate and obtain JWT token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Missing credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Logout (client-side token discard)
      tags: [Auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"

  # ── OIDC ────────────────────────────────────────────────────────────
  /oidc/.well-known/openid-configuration:
    get:
      operationId: oidcDiscovery
      summary: OpenID Connect Discovery document
      tags: [OIDC]
      security: []
      responses:
        "200":
          description: OIDC discovery metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OIDCDiscovery"

  /oidc/authorize:
    get:
      operationId: oidcAuthorize
      summary: Authorization endpoint (Authorization Code + PKCE)
      tags: [OIDC]
      security: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: scope
          in: query
          schema:
            type: string
            example: openid profile email
        - name: state
          in: query
          schema:
            type: string
        - name: nonce
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          description: PKCE code challenge (S256)
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
            enum: [S256]
      responses:
        "302":
          description: Redirects to redirect_uri with authorization code
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /oidc/token:
    post:
      operationId: oidcToken
      summary: Token endpoint (exchange code for tokens)
      tags: [OIDC]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, code, redirect_uri, client_id]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code]
                code:
                  type: string
                redirect_uri:
                  type: string
                  format: uri
                client_id:
                  type: string
                client_secret:
                  type: string
                  description: Required for confidential clients
                code_verifier:
                  type: string
                  description: PKCE code verifier
      responses:
        "200":
          description: Token response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OIDCTokenResponse"
        "400":
          description: Invalid grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OIDCError"

  /oidc/userinfo:
    get:
      operationId: oidcUserinfo
      summary: UserInfo endpoint
      tags: [OIDC]
      responses:
        "200":
          description: User claims
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OIDCUserInfo"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /oidc/jwks:
    get:
      operationId: oidcJWKS
      summary: JSON Web Key Set (public signing keys)
      tags: [OIDC]
      security: []
      responses:
        "200":
          description: JWKS document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKS"

  # ── MFA ─────────────────────────────────────────────────────────────
  /api/v1/mfa/status:
    get:
      operationId: getMFAStatus
      summary: Get MFA status for authenticated user
      tags: [MFA]
      responses:
        "200":
          description: MFA status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MFAStatus"

  /api/v1/mfa/totp/setup:
    post:
      operationId: setupTOTP
      summary: Begin TOTP setup (returns secret + QR URL)
      tags: [MFA]
      responses:
        "200":
          description: TOTP setup data
          content:
            application/json:
              schema:
                type: object
                required: [secret, qr_url]
                properties:
                  secret:
                    type: string
                  qr_url:
                    type: string
                    format: uri

  /api/v1/mfa/totp/verify:
    post:
      operationId: verifyTOTP
      summary: Verify TOTP code (activates TOTP on first success)
      tags: [MFA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                required: [valid]
                properties:
                  valid:
                    type: boolean

  /api/v1/mfa/totp:
    delete:
      operationId: disableTOTP
      summary: Disable TOTP for authenticated user
      tags: [MFA]
      responses:
        "200":
          description: TOTP disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"

  /api/v1/mfa/backup-codes:
    post:
      operationId: generateBackupCodes
      summary: Generate new set of 10 backup codes
      tags: [MFA]
      responses:
        "200":
          description: Backup codes (store securely — shown only once)
          content:
            application/json:
              schema:
                type: object
                required: [codes]
                properties:
                  codes:
                    type: array
                    items:
                      type: string
                    example: ["A1B2C3D4", "E5F6G7H8"]

  /api/v1/mfa/backup-codes/verify:
    post:
      operationId: verifyBackupCode
      summary: Verify and consume a backup code (single-use)
      tags: [MFA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                required: [valid]
                properties:
                  valid:
                    type: boolean

  /api/v1/mfa/webauthn/credentials:
    get:
      operationId: listWebAuthnCredentials
      summary: List registered WebAuthn credentials
      tags: [MFA]
      responses:
        "200":
          description: Credential list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebAuthnCredential"

    post:
      operationId: registerWebAuthnCredential
      summary: Register a new WebAuthn credential
      tags: [MFA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [credential_id, public_key, name]
              properties:
                credential_id:
                  type: string
                  format: byte
                public_key:
                  type: string
                  format: byte
                name:
                  type: string
                  example: YubiKey 5
      responses:
        "201":
          description: Credential registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"

  /api/v1/mfa/webauthn/credentials/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"
    delete:
      operationId: deleteWebAuthnCredential
      summary: Delete a WebAuthn credential
      tags: [MFA]
      responses:
        "200":
          description: Credential deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── SAML ────────────────────────────────────────────────────────────
  /saml/metadata:
    get:
      operationId: samlMetadata
      summary: SP metadata XML
      tags: [SAML]
      security: []
      responses:
        "200":
          description: SAML SP metadata
          content:
            application/xml:
              schema:
                type: string

  /saml/login:
    get:
      operationId: samlLogin
      summary: Initiate SAML login (redirects to IDP)
      tags: [SAML]
      security: []
      responses:
        "302":
          description: Redirect to Identity Provider

  /saml/acs:
    post:
      operationId: samlACS
      summary: Assertion Consumer Service (processes SAML response)
      tags: [SAML]
      security: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                SAMLResponse:
                  type: string
                RelayState:
                  type: string
      responses:
        "302":
          description: Redirect to application after successful SSO
        "400":
          description: Invalid SAML response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /saml/logout:
    get:
      operationId: samlLogout
      summary: SAML Single Logout
      tags: [SAML]
      security: []
      responses:
        "302":
          description: Redirect to IDP for logout

  # ── SCIM ────────────────────────────────────────────────────────────
  /api/v1/scim/v2/ServiceProviderConfig:
    get:
      operationId: scimConfig
      summary: SCIM Service Provider configuration
      tags: [SCIM]
      security: []
      responses:
        "200":
          description: SCIM configuration
          content:
            application/scim+json:
              schema:
                type: object

  /api/v1/scim/v2/Schemas:
    get:
      operationId: scimSchemas
      summary: SCIM schemas
      tags: [SCIM]
      security: []
      responses:
        "200":
          description: Supported SCIM schemas
          content:
            application/scim+json:
              schema:
                type: object

  /api/v1/scim/v2/Users:
    get:
      operationId: scimListUsers
      summary: List users (SCIM format)
      tags: [SCIM]
      parameters:
        - name: startIndex
          in: query
          schema:
            type: integer
            default: 1
        - name: count
          in: query
          schema:
            type: integer
            default: 100
        - name: filter
          in: query
          description: "SCIM filter (e.g. userName eq \"john\")"
          schema:
            type: string
      responses:
        "200":
          description: SCIM user list
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMListResponse"

    post:
      operationId: scimCreateUser
      summary: Create user via SCIM
      tags: [SCIM]
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/SCIMUser"
      responses:
        "201":
          description: User created
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMUser"
        "409":
          description: User already exists
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMError"

  /api/v1/scim/v2/Users/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: scimGetUser
      summary: Get user via SCIM
      tags: [SCIM]
      responses:
        "200":
          description: SCIM user
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMUser"
        "404":
          description: User not found
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMError"

    put:
      operationId: scimReplaceUser
      summary: Replace user via SCIM
      tags: [SCIM]
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/SCIMUser"
      responses:
        "200":
          description: User replaced
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMUser"

    patch:
      operationId: scimUpdateUser
      summary: Patch user via SCIM
      tags: [SCIM]
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              type: object
              properties:
                schemas:
                  type: array
                  items:
                    type: string
                Operations:
                  type: array
                  items:
                    type: object
                    properties:
                      op:
                        type: string
                        enum: [add, replace, remove]
                      path:
                        type: string
                      value: {}
      responses:
        "200":
          description: User updated
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMUser"

    delete:
      operationId: scimDeleteUser
      summary: Deactivate user via SCIM
      tags: [SCIM]
      responses:
        "204":
          description: User deactivated

  /api/v1/scim/v2/Groups:
    get:
      operationId: scimListGroups
      summary: List groups (SCIM format)
      tags: [SCIM]
      parameters:
        - name: startIndex
          in: query
          schema:
            type: integer
            default: 1
        - name: count
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: SCIM group list
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMListResponse"

    post:
      operationId: scimCreateGroup
      summary: Create group via SCIM
      tags: [SCIM]
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/SCIMGroup"
      responses:
        "201":
          description: Group created
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMGroup"

  /api/v1/scim/v2/Groups/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: scimGetGroup
      summary: Get group via SCIM
      tags: [SCIM]
      responses:
        "200":
          description: SCIM group
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMGroup"

    put:
      operationId: scimReplaceGroup
      summary: Replace group via SCIM
      tags: [SCIM]
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              $ref: "#/components/schemas/SCIMGroup"
      responses:
        "200":
          description: Group replaced
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMGroup"

    patch:
      operationId: scimUpdateGroup
      summary: Patch group via SCIM
      tags: [SCIM]
      requestBody:
        required: true
        content:
          application/scim+json:
            schema:
              type: object
      responses:
        "200":
          description: Group updated
          content:
            application/scim+json:
              schema:
                $ref: "#/components/schemas/SCIMGroup"

    delete:
      operationId: scimDeleteGroup
      summary: Delete group via SCIM
      tags: [SCIM]
      responses:
        "204":
          description: Group deleted

  # ── Users ───────────────────────────────────────────────────────────
  /api/v1/users:
    get:
      operationId: listUsers
      summary: List all users
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

    post:
      operationId: createUser
      summary: Create a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/users/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getUser
      summary: Get user by ID
      tags: [Users]
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      operationId: updateUser
      summary: Update a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: deleteUser
      summary: Deactivate a user (soft delete)
      tags: [Users]
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deactivated
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Networks ────────────────────────────────────────────────────────
  /api/v1/networks:
    get:
      operationId: listNetworks
      summary: List all VPN networks
      tags: [Networks]
      responses:
        "200":
          description: Network list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Network"

    post:
      operationId: createNetwork
      summary: Create a new VPN network
      tags: [Networks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNetworkRequest"
      responses:
        "201":
          description: Network created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Network already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/networks/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceID"

    get:
      operationId: getNetwork
      summary: Get network by ID
      tags: [Networks]
      responses:
        "200":
          description: Network found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
        "404":
          description: Network not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      operationId: updateNetwork
      summary: Update a network
      tags: [Networks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNetworkRequest"
      responses:
        "200":
          description: Network updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Network"
        "404":
          description: Network not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: deleteNetwork
      summary: Delete a network
      tags: [Networks]
      responses:
        "204":
          description: Network deleted
        "404":
          description: Network not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Devices ─────────────────────────────────────────────────────────
  /api/v1/devices:
    get:
      operationId: listDevices
      summary: List all devices
      tags: [Devices]
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"

    post:
      operationId: createDevice
      summary: Register a new device
      tags: [Devices]
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeviceRequest"
      responses:
        "201":
          description: Device registered (IP auto-assigned)
          content:
